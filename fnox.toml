# FNOX configuration for pi-config secrets
#
# Setup:
# 1. Install fnox: mise install fnox
# 2. First sync from 1Password: fnox sync --provider op --force
# 3. For fast cached access: fnox sync --provider age --force
#
# Loading secrets:
# The .mise.toml loads from .env by default. For fnox, either:
# - Add to your shell config: eval "$(fnox export --format env)"
# - Or run manually before pi: eval "$(fnox export --format env)"
# - Or set up a shell wrapper that exports fnox env vars before launching pi

[providers.age]
type = "age"
recipients = ["age1q6el4a8vtj0uyzt7447m43mp887z28eqvhmfs3a5nl383wxhpf9szjj9jc"]

[providers.op]
type = "1password"

[secrets]
# WebSearch extension - Parallel Web API
# Get key at: https://platform.parallel.ai
PARALLEL_API_KEY = { provider = "op", value = "op://dotenv/PARALLEL_API_KEY/value", sync = { provider = "age", value = "" } }

# Work environment - LiteLLM
# LITELLM_API_KEY = { provider = "op", value = "op://dotenv/LITELLM_API_KEY/value" }

# Home environment - OpenRouter & Fireworks
OPENROUTER_API_KEY = { provider = "op", value = "op://dotenv/OPENROUTER_API_KEY/value", sync = { provider = "age", value = "" } }
FIREWORKS_API_KEY = { provider = "op", value = "op://dotenv/FIREWORKS_API_KEY/value", sync = { provider = "age", value = "" } }
# ANTHROPIC_API_KEY= { provider = "op", value = "op://dotenv/ANTHROPIC_API_KEY/value", sync = { provider = "age", value = "" } }
# GEMINI_API_KEY= { provider = "op", value = "op://dotenv/GEMINI_API_KEY/value", sync = { provider = "age", value = "" } }
OPENAI_API_KEY= { provider = "op", value = "op://dotenv/OPENAI_API_KEY/value", sync = { provider = "age", value = "" } }
UIDOTSH_TOKEN= { provider = "op", value = "op://dotenv/UIDOTSH_TOKEN/value", sync = { provider = "age", value = "" } }
ANTHROPIC_API_KEY= { provider = "op", value = "op://dotenv/ANTHROPIC_API_KEY/value", sync = { provider = "age", value = "" } }
GEMINI_API_KEY= { provider = "op", value = "op://dotenv/GEMINI_API_KEY/value", sync = { provider = "age", value = "" } }
