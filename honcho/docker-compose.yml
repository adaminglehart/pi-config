services:
  database:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: honcho
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - honcho_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d honcho"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/plastic-labs/honcho:latest
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8100:8000"
    env_file:
      - .env
    restart: unless-stopped
    environment:
      # Override Docker/Orbstack proxy injection - IPv6 CIDR in NO_PROXY breaks httpx
      - HTTP_PROXY=
      - http_proxy=
      - HTTPS_PROXY=
      - https_proxy=
      - ALL_PROXY=
      - all_proxy=
      - NO_PROXY=
      - no_proxy=
    extra_hosts:
      - "host.docker.internal:host-gateway"
      # Map the LLM proxy hostname so containers can reach it on the host.
      # LITELLM_PROXY_HOST is set in .env (generated by `just honcho-env`).
      # If empty/unset, this line is a no-op since Docker ignores blank extra_hosts.
      - "${LITELLM_PROXY_HOST:-_}:host-gateway"

  deriver:
    image: ghcr.io/plastic-labs/honcho:latest
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped
    environment:
      # Override Docker/Orbstack proxy injection - IPv6 CIDR in NO_PROXY breaks httpx
      - HTTP_PROXY=
      - http_proxy=
      - HTTPS_PROXY=
      - https_proxy=
      - ALL_PROXY=
      - all_proxy=
    # The default healthcheck tries to hit localhost:8000 but the deriver has no web server
    healthcheck:
      test: ["CMD-SHELL", "ls /proc/1/status"]
      interval: 30s
      timeout: 5s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "${LITELLM_PROXY_HOST:-_}:host-gateway"

  dashboard:
    build: ./dashboard
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8101:3000"
    restart: unless-stopped

volumes:
  honcho_data:
