services:
  database:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: honcho
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - honcho_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d honcho"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/plastic-labs/honcho:latest
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8100:8000"
    env_file:
      - .env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
      # Route certproxy hostnames to the host so the Host header stays correct
      - "litellm.qa.corp.stripe.com.certproxy.localhost:host-gateway"

  deriver:
    image: ghcr.io/plastic-labs/honcho:latest
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped
    # The default healthcheck tries to hit localhost:8000 but the deriver has no web server
    healthcheck:
      test: ["CMD-SHELL", "ls /proc/1/status"]
      interval: 30s
      timeout: 5s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "litellm.qa.corp.stripe.com.certproxy.localhost:host-gateway"

  dashboard:
    build: ./dashboard
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8101:3000"
    restart: unless-stopped

volumes:
  honcho_data:
